<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <defs>
    <style>
      .t { fill: #cdd6f4; }
      .dim { fill: #6c7086; }
      .green { fill: #a6e3a1; }
      .amber { fill: #fab387; }
      .amberdim { fill: #d9a066; }
      text { opacity: 0; }
    </style>
  </defs>

  <rect width="780" height="520" rx="12" fill="#1e1e2e"/>
  <rect width="780" height="36" rx="12" fill="#181825"/>
  <rect y="20" width="780" height="16" fill="#181825"/>
  <circle cx="22" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="42" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="62" cy="18" r="6" fill="#a6e3a1"/>
  <text x="390" y="23" text-anchor="middle" class="dim" style="opacity:1" font-size="12">claude — your session, preserved in amber</text>

  <text x="24" y="70" class="green">&gt; /amber:checkpoint
    <animate attributeName="opacity" to="1" dur="0.01s" begin="0.5s" fill="freeze"/></text>
  <text x="24" y="94" class="t">⏺ State sealed to .amber/STATE.md — task, decisions, gotchas, next steps.
    <animate attributeName="opacity" to="1" dur="0.01s" begin="1.6s" fill="freeze"/></text>

  <text x="24" y="138" class="green">&gt; /compact
    <animate attributeName="opacity" to="1" dur="0.01s" begin="2.9s" fill="freeze"/></text>
  <text x="24" y="162" class="dim">✻ Compacting conversation…
    <animate attributeName="opacity" to="1" dur="0.01s" begin="3.7s" fill="freeze"/></text>
  <text x="24" y="186" class="dim">  summary written — an hour of decisions and debugging context, gone
    <animate attributeName="opacity" to="1" dur="0.01s" begin="4.5s" fill="freeze"/></text>

  <text x="24" y="226" class="dim">──────────────────────  fresh context  ──────────────────────
    <animate attributeName="opacity" to="1" dur="0.01s" begin="5.6s" fill="freeze"/></text>

  <text x="24" y="266" class="amber">&lt;amber-restore&gt;
    <animate attributeName="opacity" to="1" dur="0.01s" begin="6.6s" fill="freeze"/></text>
  <text x="24" y="290" class="amber">[Amber] Context was just compacted. The state below is authoritative.
    <animate attributeName="opacity" to="1" dur="0.01s" begin="7.0s" fill="freeze"/></text>
  <text x="24" y="314" class="amberdim">--- Working state (written by you via /amber:checkpoint) ---
    <animate attributeName="opacity" to="1" dur="0.01s" begin="7.4s" fill="freeze"/></text>
  <text x="24" y="338" class="t">## Task: migrate the auth module to OAuth2
    <animate attributeName="opacity" to="1" dur="0.01s" begin="7.8s" fill="freeze"/></text>
  <text x="24" y="362" class="t">## Decisions: leave refresh-token flow untouched (user said wait)
    <animate attributeName="opacity" to="1" dur="0.01s" begin="8.2s" fill="freeze"/></text>
  <text x="24" y="386" class="t">## Next: wire /oauth/callback, then run the auth tests
    <animate attributeName="opacity" to="1" dur="0.01s" begin="8.6s" fill="freeze"/></text>
  <text x="24" y="410" class="amber">&lt;/amber-restore&gt;
    <animate attributeName="opacity" to="1" dur="0.01s" begin="9.0s" fill="freeze"/></text>

  <text x="24" y="454" class="green">&gt; continue
    <animate attributeName="opacity" to="1" dur="0.01s" begin="10.2s" fill="freeze"/></text>
  <text x="24" y="478" class="t">⏺ Picking up exactly where we left off — wiring /oauth/callback…
    <animate attributeName="opacity" to="1" dur="0.01s" begin="11.2s" fill="freeze"/></text>
</svg>
